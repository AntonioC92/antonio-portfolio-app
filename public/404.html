<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | Caruso Martech</title>
    <meta name="description" content="This page could not be found. Explore Caruso Martech's services, work, and insights instead." />
    <meta name="robots" content="noindex" />
    <link rel="icon" href="/favicon.png" />
    <meta name="theme-color" content="#212121" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        height: 100%;
      }

      body {
        background: #212121;
        color: #fff;
        font-family: "Montserrat", sans-serif;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 32px 16px;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 64px;
      }

      .logo img {
        height: 32px;
        width: 32px;
      }

      .logo span {
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .code {
        font-size: 96px;
        font-weight: 700;
        color: #ff8164;
        line-height: 1;
      }

      h1 {
        font-size: 24px;
        font-weight: 500;
        margin-top: 24px;
      }

      p {
        font-family: "Open Sans", sans-serif;
        font-size: 15px;
        color: #b5b5b8;
        max-width: 420px;
        margin: 16px auto 40px;
        line-height: 1.6;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
      }

      .links a {
        font-family: "Open Sans", sans-serif;
        font-size: 14px;
        font-weight: 600;
        color: #212121;
        background: #ff8164;
        padding: 12px 22px;
        border-radius: 6px;
        text-decoration: none;
        transition: opacity 0.2s ease-in-out;
      }

      .links a.secondary {
        color: #fff;
        background: transparent;
        border: 1px solid #414146;
      }

      .links a:hover {
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="logo">
        <img src="/logo-mark.svg" alt="Caruso Martech logo" />
        <span>Caruso Martech</span>
      </div>
      <div class="code">404</div>
      <h1>This page doesn't exist</h1>
      <p>The link you followed may be broken, or the page may have moved. Here's where to go instead.</p>
      <div class="links">
        <a href="/">Home</a>
        <a href="/insights" class="secondary">Insights</a>
        <a href="/services" class="secondary">Services</a>
        <a href="/contact" class="secondary">Contact</a>
      </div>
    </main>
  </body>
</html>
