<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caruso Martech — Navbar Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 40px 20px; }

    .label { color: #888; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px; text-align: center; }

    /* ── NAVBAR ── */
    nav {
      width: 100%;
      max-width: 1280px;
      background: #212121;
      padding: 1rem 20px;
      box-shadow: 0px 2px 5px rgba(0,0,0,0.3);
      border-radius: 8px;
    }
    .nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1280px;
      margin: 0 auto;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      text-decoration: none;
    }
    .logo-icon {
      width: 38px;
      height: 38px;
      flex-shrink: 0;
      border-radius: 8px;
    }
    .logo-name {
      color: white;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .nav-links {
      display: flex;
      list-style: none;
      gap: 1.5rem;
      align-items: center;
    }
    .nav-links a {
      color: #f5f5f5;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: #E8541D; }
    .cta-btn {
      background: #E8541D;
      color: white !important;
      padding: 0.5rem 1.1rem;
      border-radius: 6px;
      font-weight: 600 !important;
      transition: background 0.2s !important;
    }
    .cta-btn:hover { background: #c94618 !important; color: white !important; }

    /* ── LOGO DETAILS ── */
    .details {
      margin-top: 48px;
      display: flex;
      gap: 40px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }
    .swatch-block { text-align: center; }
    .swatch-block .label { margin-bottom: 8px; }
    .icon-large {
      width: 96px;
      height: 96px;
      border-radius: 18px;
      display: block;
    }
    .icon-sizes {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      margin-top: 16px;
      justify-content: center;
    }
    .icon-sizes svg { display: block; }
    .size-label { color: #666; font-size: 10px; text-align: center; margin-top: 4px; font-family: monospace; }

    .color-chips { display: flex; gap: 12px; margin-top: 12px; }
    .chip { width: 48px; height: 48px; border-radius: 8px; }
    .chip-label { color: #888; font-size: 10px; font-family: monospace; text-align: center; margin-top: 4px; }
  </style>
</head>
<body>

  <p class="label">Navbar — Desktop view</p>

  <nav>
    <div class="nav-inner">
      <a class="logo" href="#">
        <svg class="logo-icon" width="38" height="38" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <rect width="48" height="48" rx="9" fill="#E8541D"/>
          <path d="M 26 16 A 12 12 0 1 0 26 32" stroke="white" stroke-width="5.5" fill="none" stroke-linecap="round"/>
          <line x1="26" y1="16" x2="40" y2="16" stroke="white" stroke-width="3" stroke-linecap="round"/>
          <circle cx="43.5" cy="16" r="3.5" fill="white"/>
          <line x1="29" y1="24" x2="40" y2="24" stroke="white" stroke-width="3" stroke-linecap="round"/>
          <circle cx="43.5" cy="24" r="3.5" fill="white"/>
          <line x1="26" y1="32" x2="40" y2="32" stroke="white" stroke-width="3" stroke-linecap="round"/>
          <circle cx="43.5" cy="32" r="3.5" fill="white"/>
        </svg>
        <span class="logo-name">Caruso Martech</span>
      </a>
      <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Work</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Insights</a></li>
        <li><a class="cta-btn" href="#">Let's Talk</a></li>
      </ul>
    </div>
  </nav>

  <!-- Icon detail section -->
  <div class="details">
    <div class="swatch-block">
      <p class="label">Logo mark — at size</p>
      <svg class="icon-large" width="96" height="96" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <rect width="48" height="48" rx="9" fill="#E8541D"/>
        <path d="M 26 16 A 12 12 0 1 0 26 32" stroke="white" stroke-width="5.5" fill="none" stroke-linecap="round"/>
        <line x1="26" y1="16" x2="40" y2="16" stroke="white" stroke-width="3" stroke-linecap="round"/>
        <circle cx="43.5" cy="16" r="3.5" fill="white"/>
        <line x1="29" y1="24" x2="40" y2="24" stroke="white" stroke-width="3" stroke-linecap="round"/>
        <circle cx="43.5" cy="24" r="3.5" fill="white"/>
        <line x1="26" y1="32" x2="40" y2="32" stroke="white" stroke-width="3" stroke-linecap="round"/>
        <circle cx="43.5" cy="32" r="3.5" fill="white"/>
      </svg>
      <div class="icon-sizes">
        <div>
          <svg width="16" height="16" viewBox="0 0 48 48"><rect width="48" height="48" rx="9" fill="#E8541D"/><path d="M 26 16 A 12 12 0 1 0 26 32" stroke="white" stroke-width="5.5" fill="none" stroke-linecap="round"/><line x1="26" y1="16" x2="40" y2="16" stroke="white" stroke-width="3" stroke-linecap="round"/><circle cx="43.5" cy="16" r="3.5" fill="white"/><line x1="29" y1="24" x2="40" y2="24" stroke="white" stroke-width="3" stroke-linecap="round"/><circle cx="43.5" cy="24" r="3.5" fill="white"/><line x1="26" y1="32" x2="40" y2="32" stroke="white" stroke-width="3" stroke-linecap="round"/><circle cx="43.5" cy="32" r="3.5" fill="white"/></svg>
          <div class="size-label">16px</div>
        </div>
        <div>
          <svg width="32" height="32" viewBox="0 0 48 48"><rect width="48" height="48" rx="9" fill="#E8541D"/><path d="M 26 16 A 12 12 0 1 0 26 32" stroke="white" stroke-width="5.5" fill="none" stroke-linecap="round"/><line x1="26" y1="16" x2="40" y2="16" stroke="white" stroke-width="3" stroke-linecap="round"/><circle cx="43.5" cy="16" r="3.5" fill="white"/><line x1="29" y1="24" x2="40" y2="24" stroke="white" stroke-width="3" stroke-linecap="round"/><circle cx="43.5" cy="24" r="3.5" fill="white"/><line x1="26" y1="32" x2="40" y2="32" stroke="white" stroke-width="3" stroke-linecap="round"/><circle cx="43.5" cy="32" r="3.5" fill="white"/></svg>
          <div class="size-label">32px</div>
        </div>
        <div>
          <svg width="48" height="48" viewBox="0 0 48 48"><rect width="48" height="48" rx="9" fill="#E8541D"/><path d="M 26 16 A 12 12 0 1 0 26 32" stroke="white" stroke-width="5.5" fill="none" stroke-linecap="round"/><line x1="26" y1="16" x2="40" y2="16" stroke="white" stroke-width="3" stroke-linecap="round"/><circle cx="43.5" cy="16" r="3.5" fill="white"/><line x1="29" y1="24" x2="40" y2="24" stroke="white" stroke-width="3" stroke-linecap="round"/><circle cx="43.5" cy="24" r="3.5" fill="white"/><line x1="26" y1="32" x2="40" y2="32" stroke="white" stroke-width="3" stroke-linecap="round"/><circle cx="43.5" cy="32" r="3.5" fill="white"/></svg>
          <div class="size-label">48px</div>
        </div>
        <div>
          <svg width="64" height="64" viewBox="0 0 48 48"><rect width="48" height="48" rx="9" fill="#E8541D"/><path d="M 26 16 A 12 12 0 1 0 26 32" stroke="white" stroke-width="5.5" fill="none" stroke-linecap="round"/><line x1="26" y1="16" x2="40" y2="16" stroke="white" stroke-width="3" stroke-linecap="round"/><circle cx="43.5" cy="16" r="3.5" fill="white"/><line x1="29" y1="24" x2="40" y2="24" stroke="white" stroke-width="3" stroke-linecap="round"/><circle cx="43.5" cy="24" r="3.5" fill="white"/><line x1="26" y1="32" x2="40" y2="32" stroke="white" stroke-width="3" stroke-linecap="round"/><circle cx="43.5" cy="32" r="3.5" fill="white"/></svg>
          <div class="size-label">64px</div>
        </div>
      </div>
    </div>

    <div class="swatch-block">
      <p class="label">Brand colours</p>
      <div class="color-chips">
        <div>
          <div class="chip" style="background:#E8541D;"></div>
          <div class="chip-label">#E8541D<br>Primary</div>
        </div>
        <div>
          <div class="chip" style="background:#212121;"></div>
          <div class="chip-label">#212121<br>Dark BG</div>
        </div>
        <div>
          <div class="chip" style="background:#F5F5F5; border:1px solid #444;"></div>
          <div class="chip-label">#F5F5F5<br>Light</div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
