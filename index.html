<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      Fix (2026-07-23): title/description/OG/twitter tags used to be hardcoded
      here AND injected per route by the Seo component via react-helmet-async
      (see src/components/Seo/index.tsx, used on every page). Because the
      app-head placeholder sits at the end of the head tag, the Helmet tags
      were appended after these static ones, and per the HTML spec the first
      title/meta in head wins, so every route's real title and description
      were silently shadowed by this generic homepage copy in the actual
      served HTML, even though the correct tags were also present later in
      the same document. Every page sets its own via Seo, including the
      homepage (MainPage.tsx), so these static defaults are pure duplicates
      now that prerender injects real per-route tags into that placeholder.
      Removed rather than reordered, to avoid leaving stale duplicate tags in
      the DOM for crawlers that read every occurrence rather than just the
      first.
    -->

    <link rel="icon" href="/favicon.png" />
    <meta name="theme-color" content="#111827" />

    <!-- Google Tag Manager -->
    <script type="module">
      if (import.meta.env.MODE === "production") {
        (function (w, d, s, l, i) {
          w[l] = w[l] || [];
          w[l].push({ "gtm.start": new Date().getTime(), event: "gtm.js" });
          var f = d.getElementsByTagName(s)[0],
            j = d.createElement(s),
            dl = l != "dataLayer" ? "&l=" + l : "";
          j.async = true;
          j.src = "https://www.googletagmanager.com/gtm.js?id=" + i + dl;
          f.parentNode.insertBefore(j, f);
        })(window, document, "script", "dataLayer", "GTM-K6N24WNB");
      }
    </script>
    <!-- End Google Tag Manager -->
    <!--app-head-->
  </head>

  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript>
      <iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-K6N24WNB"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe>
    </noscript>
    <!-- End Google Tag Manager (noscript) -->

    <div id="root"><!--app-html--></div>

    <!-- Vite entry -->
    <script type="module" src="/src/main.tsx"></script>

    <script src="https://js.hsforms.net/forms/embed/49326248.js" defer></script>

  </body>
</html>
